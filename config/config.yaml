data:
  path: "data/dataset.csv"
  target: "target"
  test_size: 0.2
feature_engineering:
  auto_interactions: true
  polynomial_degree: 2
  target_encoding: true
  frequency_encoding: true
model:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.03
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping: 50
  cv_folds: 5
